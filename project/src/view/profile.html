<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiili</title>
    <link rel="stylesheet" href="../../css/profile_style.css">
  </head>
  <body>
    <section class="hero profile-hero">
      <a href="restaurants.html" class="back-btn" id="backBtn">&larr; Takaisin</a>
      <button type="button" class="logout-btn" id="logoutBtn">Kirjaudu ulos</button>

      <div class="profile-card">
        <label class="profile-image-wrap" for="avatarInput">
          <img
            src="../../img/picture8.jpg"
            alt="Profiili"
            class="profile-img"
            id="profileAvatar"
          >
          <span class="avatar-overlay">Vaihda kuva</span>
        </label>
        <input
          type="file"
          id="avatarInput"
          accept="image/*"
          class="avatar-input"
        >
        <h1 id="profileHeroName">Opiskelija</h1>
        <p>Metropolia AMK</p>
        <div class="profile-box">
          <div class="profile-info">
            <p>
              <strong>K&auml;ytt&auml;j&auml;tunnus:</strong>
              <span id="profileUsername">-</span>
            </p>
            <p><strong>S&auml;hk&ouml;posti:</strong> <span id="profileEmail">-</span></p>
          </div>

          <button type="button" id="showEditBtn" class="edit-toggle-btn">
            Muokkaa tietoja
          </button>

          <form id="profileForm" class="profile-form is-hidden">
            <h2>Muokkaa tietoja</h2>

            <label class="profile-label" for="editUsername">K&auml;ytt&auml;j&auml;tunnus</label>
            <input
              type="text"
              id="editUsername"
              class="profile-input"
              autocomplete="username"
              required
            >

            <label class="profile-label" for="editEmail">S&auml;hk&ouml;posti</label>
            <input
              type="email"
              id="editEmail"
              class="profile-input"
              autocomplete="email"
              required
            >

            <label class="profile-label" for="editPassword">Uusi salasana (valinnainen)</label>
            <input
              type="password"
              id="editPassword"
              class="profile-input"
              autocomplete="new-password"
              minlength="4"
            >

            <div class="profile-form-actions">
              <button type="submit" class="save-btn">Tallenna muutokset</button>
              <button type="button" id="cancelEditBtn" class="cancel-btn">Peruuta</button>
            </div>
            <p id="profileMessage" class="profile-message"></p>
          </form>
        </div>
      </div>
    </section>

    <script type="module" src="../js/profile.js"></script>
  </body>
</html>
