<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opiskelijaravintolat</title>
    <link rel="stylesheet" href="../../css/restaurants_style.css">
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin
    >
  </head>
  <body>
    <script>
      window.RESTAURANT_API_BASE_URL =
        'https://media2.edu.metropolia.fi/restaurant/api/v1';
    </script>

    <section class="landing-hero">
      <div class="hero-actions">
        <a href="profile.html" class="profile-nav" aria-label="Avaa profiili">
          <img
            src="../../img/picture8.jpg"
            alt="Profiili"
            class="profile-avatar"
            id="heroAvatar"
          >
          <span class="profile-name" id="heroProfileName">Opiskelija</span>
        </a>
        <button type="button" class="logout-btn" id="logoutBtn">Kirjaudu ulos</button>
      </div>

      <div class="hero-content">
        <h1>Opiskelijaravintolat</h1>
        <p>Valitse ravintola ja tarkastele ruokalistaa</p>
      </div>
    </section>

    <main id="content" class="container">
      <section class="search-section">
        <div class="search-container">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Hae ravintoloita..."
            aria-label="Hae ravintoloita nimell&auml; tai osoitteella"
          >
          <button class="search-btn" id="searchBtn" type="button">Hae</button>
        </div>

        <div class="menu-type-buttons">
          <button
            class="menu-btn-daily active"
            id="dailyBtn"
            type="button"
            aria-pressed="true"
          >
            P&auml;iv&auml;n ruokalista
          </button>
          <button
            class="menu-btn-weekly"
            id="weeklyBtn"
            type="button"
            aria-pressed="false"
          >
            Viikon ruokalista
          </button>
        </div>

        <div class="view-filter-bar">
          <button
            type="button"
            class="view-filter-btn active"
            data-filter="all"
          >
            Kaikki ravintolat
          </button>
          <button type="button" class="view-filter-btn" data-filter="favorites">
            Tyk&auml;tyt ravintolat
          </button>
        </div>

        <div class="advanced-filters">
          <label class="filter-group">
            <span>Kaupunki</span>
            <select id="cityFilter" class="filter-select">
              <option value="all">Kaikki kaupungit</option>
            </select>
          </label>

          <label class="filter-group">
            <span>Palveluntarjoaja</span>
            <select id="providerFilter" class="filter-select">
              <option value="all">Kaikki palveluntarjoajat</option>
            </select>
          </label>
        </div>
      </section>

      <section class="map-section" aria-label="Ravintolat kartalla">
        <div class="map-section-header">
          <h2>Ravintolat kartalla</h2>
          <p>Valitse ravintola listasta tai markerista kartalla</p>
        </div>
        <div id="restaurantsMapRoot" class="restaurants-map-root"></div>
      </section>

      <div class="content-wrapper">
        <aside class="restaurants-sidebar">
          <h2>Ravintolat</h2>
          <div id="restaurantsList" class="restaurants-list">
            <div class="loading">Ladataan ravintoloita...</div>
          </div>
        </aside>

        <section class="menu-section">
          <div id="menuContent" class="menu-content">
            <div class="empty-state">
              <p>Valitse ravintola n&auml;hd&auml;ksesi ruokalistan</p>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Opiskelijaravintolat. Kaikki oikeudet pid&auml;tet&auml;&auml;n.</p>
    </footer>

    <script type="module" src="../js/restaurants.js"></script>
  </body>
</html>
