<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirjaudu sis&auml;&auml;n</title>
    <link rel="stylesheet" href="../../css/login_style.css">
  </head>
  <body>
    <section class="hero login-hero">
      <div class="login-box">
        <h1>Kirjaudu sis&auml;&auml;n</h1>
        <p>Opiskelijaravintolat</p>

        <div id="loginPanel">
          <form class="login-form" id="loginForm">
            <input
              type="text"
              name="username"
              placeholder="K&auml;ytt&auml;j&auml;tunnus"
              required
            >
            <input
              type="password"
              name="password"
              placeholder="Salasana"
              autocomplete="current-password"
              required
            >
            <p class="form-message error" id="loginError"></p>
            <button type="submit">Kirjaudu</button>
          </form>

          <p class="switch-text">
            Ei k&auml;ytt&auml;j&auml;&auml;?
            <button type="button" class="switch-btn" id="showRegister">
              Rekister&ouml;idy
            </button>
          </p>
        </div>

        <div id="registerPanel" hidden>
          <form class="login-form" id="registerForm">
            <input
              type="text"
              name="username"
              placeholder="K&auml;ytt&auml;j&auml;tunnus"
              required
            >
            <input
              type="email"
              name="email"
              placeholder="S&auml;hk&ouml;posti"
              required
            >
            <input
              type="password"
              name="password"
              placeholder="Salasana"
              autocomplete="new-password"
              required
            >
            <input
              type="password"
              name="confirmPassword"
              placeholder="Vahvista salasana"
              autocomplete="new-password"
              required
            >
            <p class="form-message error" id="registerError"></p>
            <p class="form-message success" id="registerSuccess"></p>
            <button type="submit">Rekister&ouml;idy</button>
          </form>

          <p class="switch-text">
            Onko jo k&auml;ytt&auml;j&auml;?
            <button type="button" class="switch-btn" id="showLogin">
              Kirjaudu
            </button>
          </p>
        </div>
      </div>
    </section>

    <script type="module" src="../js/login.js"></script>
  </body>
</html>
